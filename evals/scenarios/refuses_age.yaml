name: refuses_age
description: >
  Prospect refuses to give their age. Agent should try once more
  politely and then respect the refusal.
prospect_persona: >
  A 66-year-old woman who considers her age a private matter and
  doesn't want to share it with a stranger on the phone.
initial_stage: age_range
turns:
  - speaker: prospect
    text: "I'd rather not say my age. That's personal."
  - speaker: agent
    text: "I completely understand, it's just to see if you'd qualify for these benefits. But no pressure at all — if you'd prefer, I can have a licensed agent reach out who can walk you through everything."
assertions:
  - type: no_forbidden_phrase
    expected: null
    params:
      forbidden_phrases:
        - "I need your age"
        - "you have to tell me"
        - "required"
        - "we can't proceed without"
        - "mandatory"
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
  - type: response_under_word_limit
    params:
      limit: 50
expected_final_stage: age_range
tags:
  - objection
  - privacy
  - age_refusal
