name: over_85
description: Prospect is over 85 and is disqualified.
prospect_persona: Prospect is 90 years old.
initial_stage: age_range
turns:
- speaker: prospect
  text: No, I am ninety years old.
- speaker: agent
  text: Just so I make sure I heard you right, you're not between forty and eighty-five,
    correct?
- speaker: prospect
  text: Yes.
- speaker: agent
  text: Understood. These usually fit people in that range, so I won't waste your
    time. Take care.
assertions:
- type: profile_field_equals
  expected: false
  params:
    field: age_range_confirmed
- type: profile_field_equals
  expected: Not between 40 and 85 years old
  params:
    field: disqualified_reason
- type: final_stage
  expected: disqualified
- type: final_outcome
  expected: disqualified
- type: disqualified_only_after_confirmation
- type: no_agent_turn_after_terminal
expected_final_stage: disqualified
tags:
- disqualified
- age
