name: already_covered
description: >
  Prospect says they already have coverage. Agent should position
  as a review rather than a replacement, and avoid replacement language.
prospect_persona: >
  A 70-year-old man who already has a life insurance policy and does
  not want to be talked into replacing it.
initial_stage: interest_check
turns:
  - speaker: prospect
    text: "Yeah sure, go ahead."
  - speaker: agent
    text: "Thank you for your time. To see if you qualify, may I ask how old you are?"
  - speaker: prospect
    text: "I'm 70 but I already have coverage. I don't need anything else."
  - speaker: agent
    text: "That's great that you already have something in place. We just help folks review their options to make sure they have the best fit. No pressure at all."
assertions:
  - type: no_forbidden_phrase
    expected: null
    params:
      forbidden_phrases:
        - "replace your policy"
        - "cancel your current"
        - "switch to"
        - "your policy is bad"
        - "better than what you have"
        - "drop your coverage"
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
expected_final_stage: living_situation
tags:
  - objection
  - already_covered
  - compliance
