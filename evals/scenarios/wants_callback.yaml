name: wants_callback
description: >
  Prospect asks to be called back later. Agent must capture the
  callback request and transition correctly.
prospect_persona: >
  A 57-year-old man who is interested but currently at work and
  needs to be called back in the evening.
initial_stage: opening
turns:
  - speaker: prospect
    text: "Hey, can you call me back later? I'm at work right now."
  - speaker: agent
    text: "Absolutely, no problem at all. I'll make sure we give you a call back at a better time. Have a great rest of your day."
assertions:
  - type: callback_captured
  - type: no_forbidden_phrase
    expected: null
    params:
      forbidden_phrases:
        - "this will only take"
        - "just one minute"
        - "real quick"
        - "before you go"
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
expected_final_stage: callback
tags:
  - callback
  - busy
  - compliance
