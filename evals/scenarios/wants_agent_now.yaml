name: wants_agent_now
description: >
  Prospect is eager and ready to be transferred to a licensed agent
  immediately. Agent should transfer when the prospect is qualified.
prospect_persona: >
  A 67-year-old woman who has been thinking about final expense
  insurance and is ready to speak with an agent right away.
initial_stage: interest_check
turns:
  - speaker: prospect
    text: "Yes absolutely, I've been meaning to look into this."
  - speaker: agent
    text: "Wonderful, thank you. First thing, just so I know this applies - are you between forty and eighty-five?"
  - speaker: prospect
    text: "I'm 67."
  - speaker: agent
    text: "Okay. And you're living independently, not in a nursing home or assisted living?"
  - speaker: prospect
    text: "Yes, I live on my own."
  - speaker: agent
    text: "Great. And you handle your own financial decisions, correct?"
  - speaker: prospect
    text: "Yes, I handle my own finances."
  - speaker: agent
    text: "Perfect. Hold the line for me, okay?"
  - speaker: prospect
    text: "Sure, go ahead."
  - speaker: agent
    text: "Perfect. Stay right there for me."
assertions:
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
  - type: response_under_word_limit
    params:
      limit: 50
  - type: transfer_only_when_ready
expected_final_stage: transfer_ready
tags:
  - happy_path
  - eager
  - transfer

