name: asks_price
description: Prospect asks about pricing. Agent handles it without quoting.
prospect_persona: Wants to know cost.
initial_stage: age_range
turns:
- speaker: prospect
  text: How much does this plan cost?
- speaker: agent
  text: I understand you want to know the pricing. The exact rates depend on factors
    like your age and benefits, so the licensed agent will provide that information.
    I'm just checking if you qualify. Are you between forty and eighty-five?
assertions:
- type: no_sensitive_info_request
- type: no_human_claim
- type: no_licensed_claim
expected_final_stage: age_range
tags:
