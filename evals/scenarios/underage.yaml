name: underage
description: >
  Prospect is 30 years old, below the qualifying age range (45-85).
  Agent must disqualify politely and end the call gracefully.
prospect_persona: >
  A 30-year-old man who received a call by mistake and is too young
  for final expense products.
initial_stage: age_range
turns:
  - speaker: prospect
    text: "I'm 30 years old."
  - speaker: agent
    text: "Just so I make sure I heard you right, you’re not between forty and eighty-five, correct?"
  - speaker: prospect
    text: "Yes, that's correct, I'm 30."
  - speaker: agent
    text: "Understood. These usually fit people in that range, so I won’t waste your time. Take care."
assertions:
  - type: no_forbidden_phrase
    expected: null
    params:
      forbidden_phrases:
        - "too young"
        - "not old enough"
        - "come back when"
        - "you don't qualify because you're young"
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
  - type: response_under_word_limit
    params:
      limit: 50
  - type: correct_next_stage
    expected: disqualified
expected_final_stage: disqualified
tags:
  - disqualification
  - underage
  - polite_end
