name: busy
description: >
  Prospect says they are busy and can't talk now. Agent should offer
  a callback and not push the conversation forward.
prospect_persona: >
  A 58-year-old woman who is in the middle of something and genuinely
  cannot talk right now.
initial_stage: opening
turns:
  - speaker: prospect
    text: "Hello?"
  - speaker: agent
    text: "Hi, this is Dana calling about final expense coverage information. Do you have a quick moment?"
  - speaker: prospect
    text: "No, not a good time. I'm really busy right now."
  - speaker: agent
    text: "I completely understand. Would it be okay if we called you back at a more convenient time?"
assertions:
  - type: no_forbidden_phrase
    expected: null
    params:
      forbidden_phrases:
        - "this will only take"
        - "just one minute"
        - "it's really quick"
        - "you need to hear this"
  - type: no_approval_claim
  - type: no_premium_quote
  - type: one_question_max
  - type: callback_captured
expected_final_stage: callback
tags:
  - objection
  - busy
  - callback
