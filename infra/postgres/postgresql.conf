# =============================================================================
# PostgreSQL Custom Optimized Production Settings
# For self-hosted dedicated servers (NVMe drives, 32GB-64GB RAM preferred)
# =============================================================================

# -----------------------------------------------------------------------------
# Connections and Resources
# -----------------------------------------------------------------------------
max_connections = 100                 # Real connections (use PgBouncer for pooling)

# -----------------------------------------------------------------------------
# Memory Settings (Tuned for ~32GB RAM host)
# -----------------------------------------------------------------------------
shared_buffers = 8GB                  # 25% of total system RAM
effective_cache_size = 24GB           # 75% of total system RAM
work_mem = 64MB                       # Memory per sort/hash operation (supports high count)
maintenance_work_mem = 2GB            # Memory for index creation, vacuums

# -----------------------------------------------------------------------------
# Write-Ahead Log (WAL) & Checkpoints
# -----------------------------------------------------------------------------
wal_buffers = 16MB                    # 1/32 of shared_buffers, max 16MB
checkpoint_completion_target = 0.9    # Smooth out checkpoint writes
checkpoint_timeout = 15min            # Allow checkpoints to be spaced further apart
max_wal_size = 16GB                   # Maximum WAL volume size
min_wal_size = 2GB

# -----------------------------------------------------------------------------
# Disk / NVMe Optimizations
# -----------------------------------------------------------------------------
random_page_cost = 1.1                # Close to 1.0 for SSD/NVMe drives (default is 4.0 for HDD)
effective_io_concurrency = 200        # Concurrent read operations supported by SSD/NVMe RAID
seq_page_cost = 1.0

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_min_duration_statement = 250      # Log queries taking longer than 250ms (for performance profiling)
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'UTC'

# -----------------------------------------------------------------------------
# Locale & Timezone
# -----------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'
