# Final Expense Specific Configuration

qualification:
  # Order in which qualification steps should be completed
  order:
    - interest_confirmed
    - age_range_confirmed
    - living_independently
    - financial_decision_maker

  # Age boundaries for qualification
  disqualifier_age_min: 40
  disqualifier_age_max: 85

  # Maximum number of gentle objection-handling attempts before gracefully ending
  max_objection_attempts: 2

transfer:
  # Requirements that must be met before transferring to a licensed agent
  requirements:
    - interest_confirmed
    - age_range_confirmed
    - living_independently
    - financial_decision_maker
  # Whether to summarize qualification before transfer
  summarize_before_transfer: false
  # Maximum hold time before offering callback (seconds)
  max_hold_time_sec: 120

callback:
  # Window in hours during which callbacks can be scheduled
  window_hours: 72
  # Earliest callback time (24h format)
  earliest_hour: 9
  # Latest callback time (24h format)
  latest_hour: 20

