# Sovereign Voice Stack - Docker Compose
# Ultra-low-latency Voice AI on single L40S GPU

version: "3.8"

services:
  # ============================================
  # vLLM Server - The Brain (Llama-3.1-8B-Instruct)
  # ============================================
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: sovereign-vllm
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_MODEL=${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-4096}
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.7}
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-fp8}
      - VLLM_ENABLE_PREFIX_CACHING=${VLLM_ENABLE_PREFIX_CACHING:-true}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    entrypoint: []
    command: >
      sh -c '
      ARGS="--model $${VLLM_MODEL} --dtype auto --gpu-memory-utilization $${VLLM_GPU_MEMORY_UTILIZATION} --max-model-len $${VLLM_MAX_MODEL_LEN} --host 0.0.0.0 --port 8000 --trust-remote-code --enforce-eager"
      if [ "$${VLLM_QUANTIZATION}" != "none" ] && [ -n "$${VLLM_QUANTIZATION}" ]; then
        ARGS="$$ARGS --quantization $${VLLM_QUANTIZATION}"
      fi
      if [ "$${VLLM_ENABLE_PREFIX_CACHING}" = "true" ]; then
        ARGS="$$ARGS --enable-prefix-caching"
      fi
      exec python3 -m vllm.entrypoints.openai.api_server $$ARGS
      '
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ============================================
  # Voice Agent - STT/TTS/Orchestration
  # ============================================
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sovereign-voice-agent
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      vllm-server:
        condition: service_healthy
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_BASE_URL=http://vllm-server:8000/v1
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DANA_OPENING_LINE=${DANA_OPENING_LINE:-}
      - DANA_LLM_MODEL=${DANA_LLM_MODEL:-}
      - DANA_MAX_TOKENS=${DANA_MAX_TOKENS:-70}
      - DANA_TEMPERATURE=${DANA_TEMPERATURE:-0.45}
      - DANA_TOP_P=${DANA_TOP_P:-0.9}
      - DANA_STT_MODEL=${DANA_STT_MODEL:-large-v3-turbo}
      - DANA_STT_COMPUTE_TYPE=${DANA_STT_COMPUTE_TYPE:-float16}
      - DANA_VAD_THRESHOLD=${DANA_VAD_THRESHOLD:-0.5}
      - DANA_MIN_SILENCE_MS=${DANA_MIN_SILENCE_MS:-200}
      - DANA_TTS_VOICE=${DANA_TTS_VOICE:-af_bella}
      - DANA_TTS_SPEED=${DANA_TTS_SPEED:-1.0}
      - DANA_TURN_MIN_DELAY=${DANA_TURN_MIN_DELAY:-0.15}
      - DANA_TURN_MAX_DELAY=${DANA_TURN_MAX_DELAY:-0.55}
      - DANA_PREEMPTIVE_GENERATION=${DANA_PREEMPTIVE_GENERATION:-true}
      - DANA_STT_PROVIDER=${DANA_STT_PROVIDER:-local}
    volumes:
      - ./:/app:ro
      - agent-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Use remaining ~30% of GPU memory (14.4GB on L40S)
    # STT (Whisper large-v3-turbo): ~3GB
    # TTS (Kokoro ONNX): ~1GB
    # Buffers/Overhead: ~10GB

  # ============================================
  # LiveKit Server (Optional - for local testing)
  # ============================================
  livekit:
    image: livekit/livekit-server:latest
    container_name: sovereign-livekit
    restart: unless-stopped
    ports:
      - "7880:7880" # HTTP API
      - "7881:7881" # RTC (WebRTC)
      - "7882:7882/udp" # RTC UDP
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
    command: --dev --bind 0.0.0.0
    profiles:
      - local-testing

  # ============================================
  # Redis (for LiveKit state, optional)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: sovereign-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - local-testing

volumes:
  vllm-cache:
    driver: local
  agent-cache:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    name: sovereign-voice-network
    driver: bridge
