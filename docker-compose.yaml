# =============================================================================
# Dana Voice Agent — Docker Compose (Production Environment)
# Ultra-low-latency Voice AI on dedicated GPU servers
# =============================================================================
# Usage:
#   Validate:  docker compose config
#   Start:     docker compose --env-file .env up -d --build postgres pgbouncer redis vllm-server voice-agent
#   Logs:      docker compose logs -f --tail=100 voice-agent
#   Stop:      docker compose down
# =============================================================================

services:
  # ============================================
  # PostgreSQL Database (Source of Truth)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: dana-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dana_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dana_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dana}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dana_user} -d $${POSTGRES_DB:-dana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PgBouncer Connection Pooler (Production)
  # ============================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dana-pgbouncer
    restart: always
    environment:
      - DB_USER=${POSTGRES_USER:-dana_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-dana_secure_pass}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-dana}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - RESERVE_POOL_SIZE=25
    ports:
      - "127.0.0.1:6432:6432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U $${POSTGRES_USER:-dana_user} -d $${POSTGRES_DB:-dana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Hot State & Ephemeral Cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: dana-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # vLLM Server — LLM Inference (PRIVATE)
  # ============================================
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: dana-vllm
    runtime: nvidia
    restart: "no"
    ipc: host
    shm_size: "16gb"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      --dtype auto
      --quantization ${VLLM_QUANTIZATION:-fp8}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.70}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --block-size 16
      --enforce-eager
      --enable-prefix-caching
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ============================================
  # Voice Agent — STT / TTS / Orchestration
  # ============================================
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dana-voice-agent
    command: python main.py start
    runtime: nvidia
    restart: "no"
    ipc: host
    shm_size: "16gb"
    depends_on:
      vllm-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      # ---- Database / PgBouncer ----
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dana_user}:${POSTGRES_PASSWORD:-dana_secure_pass}@pgbouncer:6432/${POSTGRES_DB:-dana}
      - DATABASE_ADMIN_URL=postgresql://${POSTGRES_USER:-dana_user}:${POSTGRES_PASSWORD:-dana_secure_pass}@postgres:5432/${POSTGRES_DB:-dana}
      # ---- Redis Hot State ----
      - REDIS_URL=redis://redis:6379/0
      - DANA_USE_REDIS_HOT_STATE=true
      - DANA_REDIS_KEY_PREFIX=dana
      # ---- Write-Behind Queue ----
      - DANA_WRITE_BEHIND_ENABLED=true
      - DANA_WRITE_BEHIND_MAX_QUEUE_SIZE=10000
      - DANA_WRITE_BEHIND_FLUSH_INTERVAL_MS=250
      - DANA_WRITE_BEHIND_BATCH_SIZE=100
      # ---- vLLM (internal network) ----
      - VLLM_BASE_URL=http://vllm-server:8000/v1
      # ---- LiveKit ----
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://replace-me.livekit.cloud}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-replace_me}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-replace_me}
      # ---- Agent Identity ----
      - DANA_AGENT_NAME=${DANA_AGENT_NAME:-Alex}
      - DANA_COMPANY_NAME=${DANA_COMPANY_NAME:-American Beneficiary}
      - DANA_AGENT_PROMPT_PATH=${DANA_AGENT_PROMPT_PATH:-prompts/final_expense_alex.md}
      # ---- Opening Behavior ----
      - DANA_OPENING_MODE=${DANA_OPENING_MODE:-wait_for_user}
      - DANA_OPENING_LINE=${DANA_OPENING_LINE:-}
      # ---- LLM Inference ----
      - DANA_LLM_MODEL=${DANA_LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - DANA_MAX_TOKENS=${DANA_MAX_TOKENS:-70}
      - DANA_TEMPERATURE=${DANA_TEMPERATURE:-0.45}
      - DANA_TOP_P=${DANA_TOP_P:-0.9}
      # ---- STT ----
      - DANA_STT_PROVIDER=${DANA_STT_PROVIDER:-local}
      - DANA_STT_MODEL=${DANA_STT_MODEL:-large-v3-turbo}
      - DANA_STT_COMPUTE_TYPE=${DANA_STT_COMPUTE_TYPE:-float16}
      - DANA_VAD_THRESHOLD=${DANA_VAD_THRESHOLD:-0.5}
      - DANA_MIN_SILENCE_MS=${DANA_MIN_SILENCE_MS:-180}
      # ---- TTS ----
      - DANA_TTS_VOICE=${DANA_TTS_VOICE:-af_bella}
      - DANA_TTS_SPEED=${DANA_TTS_SPEED:-1.03}
      # ---- Turn-Taking ----
      - DANA_TURN_MIN_DELAY=${DANA_TURN_MIN_DELAY:-0.15}
      - DANA_TURN_MAX_DELAY=${DANA_TURN_MAX_DELAY:-0.55}
      - DANA_PREEMPTIVE_GENERATION=${DANA_PREEMPTIVE_GENERATION:-true}
      # ---- Logging ----
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./:/app:ro
      - agent-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-m", "ops.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # LiveKit Server (local testing ONLY)
  # ============================================
  livekit:
    image: livekit/livekit-server:latest
    container_name: dana-livekit-local
    restart: "no"
    ports:
      - "7880:7880"      # HTTP API
      - "7881:7881"      # RTC (WebRTC)
      - "7882:7882/udp"  # RTC UDP
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-devsecret}
    command: --dev --bind 0.0.0.0
    profiles:
      - local-testing

volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local
  vllm-cache:
    driver: local
  agent-cache:
    driver: local

networks:
  default:
    name: dana-voice-network
    driver: bridge
