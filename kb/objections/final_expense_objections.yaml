# Final Expense Objection Handlers
# Each entry defines how Dana should handle a specific objection type.
# Rules:
#   - DNC/remove_me ends the call immediately
#   - angry customer gets one apology and polite end
#   - already_have_insurance positioned as review/additional coverage, not replacement
#   - price questions defer to licensed agent
#   - talk_to_spouse offers callback or include spouse
#   - one rebuttal max unless prospect re-engages

objections:
  - intent: not_interested
    keywords:
      - "not interested"
      - "no thank you"
      - "no thanks"
      - "don't want"
      - "don't need"
      - "pass"
      - "i'm good"
      - "no way"
      - "nah"
      - "not for me"
    allowed_responses:
      - "I completely understand, and I appreciate your honesty. A lot of folks felt the same way until they realized this could save their family thousands in unexpected costs. Would it be okay if I just shared one quick detail?"
      - "That's totally fair. Most people I talk to say the same thing at first. I'm just here to make sure your family is protected — can I take just 30 seconds?"
      - "I hear you. I'm not here to pressure you at all. If you ever change your mind, we're always here to help. Have a wonderful day."
    forbidden_responses:
      - "You really should be interested."
      - "You're making a mistake."
      - "Everyone needs this."
      - "But you have to listen."
    goal: "Acknowledge the concern warmly, offer one brief value statement, and respect their decision if they decline again."
    max_attempts: 1
    next_stage: "closing"
    compliance_notes: "Do not pressure. Respect the prospect's decision after one rebuttal."

  - intent: already_have_insurance
    keywords:
      - "already have insurance"
      - "already covered"
      - "have a policy"
      - "already got"
      - "i'm covered"
      - "have coverage"
      - "got insurance"
      - "taken care of"
      - "already set"
      - "have a plan"
    allowed_responses:
      - "That's wonderful that you've already taken that step! A lot of families I work with actually find that having a review done can uncover gaps or even save them money. Would you be open to a quick, no-obligation review?"
      - "That's great to hear — it shows you care about your family. Many people find that their current coverage may not fully cover today's funeral costs, which average over $10,000. Would it hurt to have someone take a quick look?"
      - "Good for you! I'm not here to replace anything you have. Sometimes an additional small policy can fill in gaps. Would a quick review be okay?"
    forbidden_responses:
      - "Your current insurance probably isn't good enough."
      - "You should cancel your other policy."
      - "That policy is probably a rip-off."
      - "You need to switch to us."
    goal: "Position as a review or additional coverage opportunity, never as a replacement for existing coverage."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Never disparage existing coverage. Position as supplemental or review only."

  - intent: busy
    keywords:
      - "i'm busy"
      - "not a good time"
      - "call back"
      - "in the middle of"
      - "can't talk"
      - "at work"
      - "driving"
      - "in a meeting"
      - "busy right now"
      - "not right now"
    allowed_responses:
      - "I totally understand — I caught you at a bad time. When would be a better time for me to give you a quick call back? It'll only take a couple of minutes."
      - "No problem at all! I know how busy life gets. What time works best for a quick two-minute call?"
      - "I appreciate you letting me know. I'll make this super quick — or I can call back at a time that's better for you. What works?"
    forbidden_responses:
      - "This will only take a second, just listen."
      - "You're never going to find a better time."
      - "This is more important than what you're doing."
    goal: "Respect their time and schedule a callback. Get a specific day and time if possible."
    max_attempts: 1
    next_stage: "callback_scheduled"
    compliance_notes: "Always offer to call back. Never pressure someone who says they are busy."

  - intent: no_money
    keywords:
      - "can't afford"
      - "no money"
      - "too expensive"
      - "on a fixed income"
      - "tight budget"
      - "don't have the money"
      - "can't pay"
      - "social security"
      - "limited income"
      - "broke"
    allowed_responses:
      - "I completely understand — budgets are tight for a lot of families right now. The good news is that many of our plans start at just a few dollars a day. Would it be worth hearing about options that fit your budget?"
      - "That's a really common concern, and I appreciate you being upfront. Many folks are surprised at how affordable coverage can be. A licensed agent can walk you through options — no commitment at all."
      - "I hear you. That's exactly why we offer plans designed for folks on a fixed income. Can I have someone reach out to share what's available in your price range?"
    forbidden_responses:
      - "You can't afford NOT to have this."
      - "Just skip something else to pay for it."
      - "It's not that expensive, come on."
      - "If you loved your family you'd find the money."
    goal: "Acknowledge the financial concern, mention affordability, and offer to connect with a licensed agent for options."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Never make the prospect feel guilty about finances. Do not quote specific prices — defer to licensed agent."

  - intent: send_information
    keywords:
      - "send me information"
      - "mail me something"
      - "send me a brochure"
      - "email me"
      - "send it in the mail"
      - "put it in writing"
      - "send me details"
      - "just send me something"
    allowed_responses:
      - "I'd be happy to! The best way to get you accurate information is to have a licensed agent put together something specific to your situation. Can I confirm your details so we can get that to you?"
      - "Absolutely — I can arrange that. To make sure we send you the right information, can I ask just a couple of quick questions?"
      - "Of course! Let me get your information so we can send that right over. What's the best address or email for you?"
    forbidden_responses:
      - "We don't send information, you have to decide now."
      - "There's nothing to send, just say yes."
      - "That's just an excuse."
    goal: "Agree to send information while using the opportunity to gather qualifying details. Transition to data collection."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Always fulfill the request to send information. Use it as a qualifying opportunity."

  - intent: who_are_you
    keywords:
      - "who are you"
      - "who is this"
      - "what company"
      - "who am I speaking with"
      - "where are you calling from"
      - "what is this about"
      - "who's calling"
      - "what organization"
    allowed_responses:
      - "Great question! My name is Dana, and I'm reaching out on behalf of a benefits center that helps families explore final expense coverage options. I'm just here to see if you might qualify for some benefits."
      - "Of course — I should have introduced myself better. I'm Dana, calling from a benefits coordination center. We help families look into affordable final expense options. No obligation at all."
      - "I'm Dana, and I'm calling to let you know about some coverage options that may be available to you. It's completely free to find out if you qualify."
    forbidden_responses:
      - "That's not important right now."
      - "Just listen to what I have to say."
      - "I'm from the government."
      - "Don't worry about who I am."
    goal: "Clearly identify yourself, the company purpose, and the reason for calling. Build trust through transparency."
    max_attempts: 1
    next_stage: "continue"
    compliance_notes: "Always provide clear identification when asked. Never misrepresent affiliation."

  - intent: is_this_a_sales_call
    keywords:
      - "is this a sales call"
      - "are you selling"
      - "trying to sell"
      - "solicitation"
      - "telemarketer"
      - "sales pitch"
      - "selling something"
      - "are you a salesman"
      - "is this telemarketing"
    allowed_responses:
      - "I appreciate you asking! I'm actually just here to see if you might qualify for some benefits. There's no pressure and no obligation — I'm just sharing information."
      - "That's a fair question. I'm not here to sell you anything today. I'm simply reaching out to let you know about some coverage options that may be available to you. It's completely up to you."
      - "I totally understand the concern. I'm really just here to share some information and see if it might be helpful for you and your family. No strings attached."
    forbidden_responses:
      - "No, this is definitely not a sales call."
      - "Absolutely not, I'm from the government."
      - "I'm not selling anything — just sign up here."
    goal: "Be honest and transparent. Reframe as information sharing and qualification, not hard selling."
    max_attempts: 1
    next_stage: "continue"
    compliance_notes: "Never deny that this is a solicitation if directly asked. Be honest while reframing positively."

  - intent: is_this_government
    keywords:
      - "government"
      - "medicare"
      - "social security office"
      - "are you with the government"
      - "federal"
      - "state program"
      - "government program"
      - "from the government"
      - "government agency"
      - "medicaid"
    allowed_responses:
      - "No, I'm not with any government agency. I'm reaching out from a private benefits center that helps families explore affordable final expense coverage options. I just want to make sure you have the right information."
      - "That's a great question — I am not with the government at all. I'm Dana, calling from a private organization that helps people learn about their coverage options. No government affiliation."
      - "I want to be completely clear — I'm not calling from any government office. I'm with a private benefits coordination center, and I'm just here to share some information that might be helpful."
    forbidden_responses:
      - "Yes, I'm with the government."
      - "This is related to your Medicare benefits."
      - "The government sent me."
      - "This is a government-approved program."
      - "We work for Social Security."
    goal: "Immediately and clearly deny any government affiliation. Be transparent about being a private entity."
    max_attempts: 1
    next_stage: "continue"
    compliance_notes: "CRITICAL: Never imply government affiliation. This is a compliance violation. Always clearly state private entity status."

  - intent: how_much
    keywords:
      - "how much"
      - "what does it cost"
      - "what's the price"
      - "what's the premium"
      - "monthly payment"
      - "how much per month"
      - "what will I pay"
      - "give me a number"
      - "price"
      - "cost"
    allowed_responses:
      - "That's a great question! The cost really depends on a few factors like your age and the coverage amount. A licensed agent can give you an exact quote — would you be open to a quick call with them?"
      - "I wish I could give you an exact number right now, but it really varies. The good news is many plans start at just a few dollars a day. A licensed agent can walk you through the specifics — no obligation."
      - "Great question — pricing depends on your individual situation. What I can tell you is that our plans are designed to be affordable. Let me connect you with someone who can give you exact numbers."
    forbidden_responses:
      - "It costs $50 a month."
      - "I can give you an exact price right now."
      - "Don't worry about the cost."
      - "It's basically free."
    goal: "Acknowledge interest in pricing, provide general affordability messaging, and defer specific quotes to a licensed agent."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Do NOT quote specific prices. Only licensed agents may provide quotes. Mention general affordability only."

  - intent: talk_to_spouse
    keywords:
      - "talk to my spouse"
      - "ask my husband"
      - "ask my wife"
      - "check with my partner"
      - "need to discuss"
      - "talk to my family"
      - "run it by"
      - "talk it over"
      - "need to ask"
      - "check with"
    allowed_responses:
      - "That makes total sense — it's a big decision and it's great that you include your family. Would it be helpful if I called back when you're both available? Or I can share the information now so you have it ready for that conversation."
      - "I completely understand — that's a smart move. Would it work to schedule a call when your spouse can join? That way you can both hear the details together."
      - "Of course! Is your spouse available now by any chance? If not, I'd be happy to call back at a time that works for both of you."
    forbidden_responses:
      - "You don't need to ask anyone."
      - "Just make the decision yourself."
      - "Your spouse doesn't need to be involved."
      - "This is too important to wait."
    goal: "Respect the decision to consult spouse. Offer callback when both are available or provide info for their discussion."
    max_attempts: 1
    next_stage: "callback_scheduled"
    compliance_notes: "Always respect the prospect's desire to consult family members. Offer callback or joint call."

  - intent: call_me_later
    keywords:
      - "call me later"
      - "call back later"
      - "try me another time"
      - "call next week"
      - "call tomorrow"
      - "another day"
      - "reach out later"
      - "not today"
    allowed_responses:
      - "Absolutely! When would be the best time to reach you? I want to make sure I catch you at a convenient time."
      - "No problem at all. What day and time works best for you? I'll make a note to call back then."
      - "Sure thing! I'll plan to follow up. Is there a specific day or time that's best for you?"
    forbidden_responses:
      - "If I don't talk to you now, I won't call back."
      - "Now is the only time I can call."
      - "You'll forget about it if we don't do this now."
    goal: "Schedule a specific callback time. Get day, time, and confirm phone number."
    max_attempts: 1
    next_stage: "callback_scheduled"
    compliance_notes: "Always honor callback requests. Record the preferred time accurately."

  - intent: remove_me
    keywords:
      - "remove me"
      - "do not call"
      - "take me off your list"
      - "stop calling"
      - "don't call again"
      - "remove my number"
      - "put me on the do not call list"
      - "DNC"
      - "unsubscribe"
      - "never call again"
      - "take my number off"
      - "don't ever call"
    allowed_responses:
      - "I completely understand, and I apologize for the inconvenience. I'll make sure your number is removed from our list right away. You have a great day."
      - "Absolutely — I'll take care of that for you right now. Your number will be removed. I'm sorry for the bother, and I hope you have a wonderful day."
      - "Of course. I'm removing your number from our list immediately. I'm sorry for the interruption. Take care."
    forbidden_responses:
      - "Are you sure?"
      - "Can I just tell you one thing first?"
      - "Let me transfer you to someone who can help."
      - "I can't do that."
      - "Just hear me out."
    goal: "Immediately comply with the DNC request. End the call politely and promptly."
    max_attempts: 0
    next_stage: "end_call"
    compliance_notes: "CRITICAL: DNC requests must be honored immediately. No rebuttals, no transfers, no delays. Log the request for compliance."

  - intent: scam_concern
    keywords:
      - "scam"
      - "fraud"
      - "is this a scam"
      - "sounds like a scam"
      - "not legitimate"
      - "sketchy"
      - "phishing"
      - "rip off"
      - "ripoff"
      - "con artist"
      - "too good to be true"
      - "is this real"
      - "is this legit"
    allowed_responses:
      - "I completely understand your concern — there are so many scams out there, and it's smart to be cautious. I want to assure you that we're a legitimate benefits coordination center. You'll never be asked for any payment or banking information on this call."
      - "That's a really fair concern, and I appreciate you being careful. We don't ask for any payment information over the phone. A licensed, state-certified agent would handle everything in person or through a verified process."
      - "I hear you, and I respect your caution. We're a private benefits center, and everything we do is through licensed agents. I'm simply here to see if you might qualify for some coverage options — no personal financial information needed from me."
    forbidden_responses:
      - "This is definitely not a scam, trust me."
      - "Would a scammer tell you this?"
      - "Just give me your information and you'll see."
      - "I promise, I'm legit."
    goal: "Acknowledge the concern respectfully. Reassure through transparency — no payment info collected on this call, licensed agents handle details."
    max_attempts: 1
    next_stage: "continue"
    compliance_notes: "Never collect payment or banking information. Emphasize licensed agents and legitimate processes."

  - intent: refuses_age
    keywords:
      - "none of your business"
      - "not telling you my age"
      - "that's personal"
      - "why do you need my age"
      - "too personal"
      - "I don't give out personal information"
      - "not sharing that"
      - "private information"
      - "rather not say"
    allowed_responses:
      - "I completely respect your privacy. I only ask because the coverage options depend on age ranges. But no pressure at all — a licensed agent can discuss everything with you at your comfort level."
      - "That's totally fine — I understand wanting to keep things private. I was just asking because the available programs depend on age. If you'd prefer, a licensed agent can go over everything with you directly."
      - "No problem at all. I only asked because eligibility depends on age, but you don't have to share anything you're not comfortable with."
    forbidden_responses:
      - "I need your age to continue."
      - "You have to tell me."
      - "Why won't you just tell me?"
      - "Fine, I'll just guess."
    goal: "Respect privacy while explaining why age matters for qualification. Offer to have licensed agent discuss in more detail."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Never pressure for personal information. Explain why it's needed but respect refusal."

  - intent: health_questions
    keywords:
      - "what about my health"
      - "pre-existing conditions"
      - "health problems"
      - "I have diabetes"
      - "I have cancer"
      - "health issues"
      - "medical questions"
      - "will my health matter"
      - "health history"
      - "medications"
    allowed_responses:
      - "That's a great question. Many of our plans are designed for people with all kinds of health backgrounds. A licensed agent can go over the specific options that work for your situation — there's no obligation to share health details with me."
      - "I appreciate you bringing that up. The good news is there are plans available for a wide range of health situations. A licensed agent would be the best person to walk through the details with you."
      - "That's something a lot of folks ask about, and it's a really important question. I'm not a licensed agent, so I can't get into specifics, but I can connect you with someone who can answer all your health-related questions."
    forbidden_responses:
      - "Your health doesn't matter at all."
      - "Everyone qualifies regardless of health."
      - "I can answer all your medical questions."
      - "Just don't tell them about your conditions."
    goal: "Acknowledge health concerns, provide general reassurance, and defer specific health-related questions to licensed agent."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "Do NOT provide specific health or underwriting guidance. Only licensed agents may discuss health-related eligibility."

  - intent: wants_licensed_agent
    keywords:
      - "licensed agent"
      - "speak to an agent"
      - "talk to someone licensed"
      - "real agent"
      - "actual agent"
      - "qualified person"
      - "speak to someone qualified"
      - "transfer me"
      - "put someone else on"
    allowed_responses:
      - "Absolutely — I'd be happy to connect you with a licensed agent. Let me just confirm a couple of quick details so they can be prepared when they reach out to you."
      - "Of course! That's exactly what we're here to arrange. Let me get a few pieces of information so the agent can give you the best possible service."
      - "Great — that's actually the next step in the process. Let me gather some quick details so a licensed agent can follow up with you right away."
    forbidden_responses:
      - "I'm just as qualified as a licensed agent."
      - "You don't need a licensed agent."
      - "There are no agents available."
      - "I can handle everything myself."
    goal: "Affirm the request and use it as a qualifying opportunity to gather information for the agent handoff."
    max_attempts: 1
    next_stage: "qualifying"
    compliance_notes: "This is a positive signal. Use the request to qualify the prospect for agent handoff."

  - intent: angry
    keywords:
      - "pissed off"
      - "angry"
      - "furious"
      - "how dare you"
      - "go to hell"
      - "leave me alone"
      - "stop harassing"
      - "harassment"
      - "sick of these calls"
      - "tired of you people"
      - "you people"
      - "damn"
      - "hell"
      - "what the hell"
      - "piss off"
    allowed_responses:
      - "I sincerely apologize for upsetting you. That was never my intention. I'll make sure you're not bothered again. I hope you have a better rest of your day."
      - "I'm truly sorry about that. I understand your frustration, and I apologize. I'll take care of this right away. Take care."
      - "I apologize — I can hear that I've caught you at a bad time, and I'm sorry. I'll make sure this doesn't happen again. Have a good day."
    forbidden_responses:
      - "Calm down."
      - "There's no need to get upset."
      - "You're overreacting."
      - "Let me just finish."
      - "It's just a phone call."
    goal: "Give one sincere apology. End the call politely and promptly. Do not argue or escalate."
    max_attempts: 1
    next_stage: "end_call"
    compliance_notes: "Do not engage further with an angry prospect. One apology, then end the call. Log for DNC consideration."
